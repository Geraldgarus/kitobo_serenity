<!DOCTYPE html>
<html>
<head>
    <title>Login Activity Logs</title>
    <style>
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .error { color: red; padding: 20px; text-align: center; }
        .login-prompt { text-align: center; padding: 50px; }
        button { padding: 10px 20px; background: #4CAF50; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h2>User Login Activity Logs</h2>
    <div id="content"></div>

    <script>
        async function loadLogs() {
            const content = document.getElementById('content');
            
            // Check if user is logged in
            const token = localStorage.getItem('token');
            
            if (!token) {
                content.innerHTML = `
                    <div class="login-prompt">
                        <p>Please login to view activity logs</p>
                        <button onclick="window.location.href='/'">Go to Login</button>
                    </div>
                `;
                return;
            }
            
            try {
                const response = await fetch('/api/activity-logs', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.status === 401) {
                    content.innerHTML = `
                        <div class="login-prompt">
                            <p>Session expired. Please login again.</p>
                            <button onclick="logout()">Login Again</button>
                        </div>
                    `;
                    return;
                }
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const logs = await response.json();
                
                // Ensure logs is an array
                if (!Array.isArray(logs)) {
                    console.error('Logs is not an array:', logs);
                    content.innerHTML = '<div class="error">Invalid data format received</div>';
                    return;
                }
                
                if (logs.length === 0) {
                    content.innerHTML = '<div class="error">No login activity found</div>';
                    return;
                }
                
                // Create table
                let html = `
                    <table>
                        <thead>
                            <tr>
                                <th>Username</th>
                                <th>Action</th>
                                <th>Time</th>
                                <th>IP Address</th>
                                <th>Device/Browser</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                logs.forEach(log => {
                    html += `
                        <tr>
                            <td>${log.username || 'N/A'}</td>
                            <td>${log.action || 'N/A'}</td>
                            <td>${log.time ? new Date(log.time).toLocaleString() : 'N/A'}</td>
                            <td>${log.ip_address || 'N/A'}</td>
                            <td>${log.user_agent ? log.user_agent.substring(0, 50) + '...' : 'N/A'}</td>
                        </tr>
                    `;
                });
                
                html += `</tbody></table>`;
                content.innerHTML = html;
                
            } catch (err) {
                console.error('Failed to load logs:', err);
                content.innerHTML = `<div class="error">Error loading logs: ${err.message}</div>`;
            }
        }
        
        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/';
        }
        
        // Load logs on page load
        loadLogs();
        
        // Refresh every 30 seconds
        setInterval(loadLogs, 30000);
    </script>

<!-- POS Chooser Modal -->
<div id="pos-chooser-overlay" onclick="if(event.target===this)closePOSChooser()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9999;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:18px;padding:40px 36px;max-width:460px;width:92%;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,0.28);position:relative;">
    <div style="font-size:22px;font-weight:700;color:#1e293b;margin-bottom:6px;display:flex;align-items:center;justify-content:center;gap:10px;"><i class="fas fa-cash-register" style="color:#2d9c6e;"></i> Point of Sale</div>
    <p style="color:#64748b;margin:0 0 28px;font-size:14px;">Select the POS system to open</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;">
      <a href="/bar" onclick="closePOSChooser()" style="display:flex;flex-direction:column;align-items:center;gap:10px;padding:26px 16px;background:linear-gradient(135deg,#1e3a5f,#2563eb);border-radius:14px;color:#fff;text-decoration:none;font-weight:700;font-size:15px;transition:transform 0.15s,box-shadow 0.15s;" onmouseover="this.style.transform='translateY(-3px)';this.style.boxShadow='0 10px 28px rgba(37,99,235,0.4)'" onmouseout="this.style.transform='translateY(0)';this.style.boxShadow='none'">
        <i class="fas fa-wine-glass-alt" style="font-size:34px;opacity:0.95;"></i>
        Bar
      </a>
      <a href="/restaurant" onclick="closePOSChooser()" style="display:flex;flex-direction:column;align-items:center;gap:10px;padding:26px 16px;background:linear-gradient(135deg,#7c2d12,#ea580c);border-radius:14px;color:#fff;text-decoration:none;font-weight:700;font-size:15px;transition:transform 0.15s,box-shadow 0.15s;" onmouseover="this.style.transform='translateY(-3px)';this.style.boxShadow='0 10px 28px rgba(234,88,12,0.4)'" onmouseout="this.style.transform='translateY(0)';this.style.boxShadow='none'">
        <i class="fas fa-utensils" style="font-size:34px;opacity:0.95;"></i>
        Restaurant
      </a>
    </div>
    <button onclick="closePOSChooser()" style="padding:9px 28px;border:1.5px solid #e2e8f0;border-radius:8px;background:#f8fafc;cursor:pointer;color:#64748b;font-size:13px;font-weight:500;">Cancel</button>
  </div>
</div>
<script>
function openPOSChooser(){var o=document.getElementById('pos-chooser-overlay');if(o){o.style.display='flex';}}
function closePOSChooser(){var o=document.getElementById('pos-chooser-overlay');if(o){o.style.display='none';}}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closePOSChooser();});
</script>
</body>
</html>
