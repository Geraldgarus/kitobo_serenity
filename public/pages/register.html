<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Steps PMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f8f6f2 0%, #f0ebe2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .register-container {
      max-width: 500px;
      width: 100%;
      background: white;
      border-radius: 32px;
      box-shadow: 0 25px 45px -12px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    .register-header {
      background: #1a2c3e;
      padding: 1.8rem 2rem;
      text-align: center;
      color: white;
    }
    .register-header i { font-size: 2.5rem; color: #c9933a; margin-bottom: 0.5rem; }
    .register-header h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; }
    .register-header p { font-size: 0.85rem; opacity: 0.8; margin-top: 5px; }
    .register-body { padding: 2rem; }
    .form-group { margin-bottom: 1.4rem; }
    label { display: block; font-weight: 500; font-size: 0.85rem; margin-bottom: 6px; color: #2c3e4e; }
    input, select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      font-family: inherit;
      font-size: 0.9rem;
      background: #fefefe;
    }
    input:focus, select:focus { outline: none; border-color: #c9933a; box-shadow: 0 0 0 3px rgba(201,147,58,0.1); }
    .btn-register {
      width: 100%;
      background: #c9933a;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 0.5rem;
    }
    .btn-register:hover { background: #a87a2c; transform: translateY(-1px); }
    .error-message { color: #e74c3c; font-size: 0.8rem; margin-top: 8px; text-align: center; }
    .success-message { color: #059669; font-size: 0.8rem; margin-top: 8px; text-align: center; }
    .login-link { text-align: center; margin-top: 1rem; font-size: 0.85rem; }
    .login-link a { color: #c9933a; text-decoration: none; }
  </style>
</head>
<body>
<div class="register-container">
  <div class="register-header">
    <i class="fas fa-user-plus"></i>
    <h1>Create Account</h1>
    <p>Register to access Steps PMS</p>
  </div>
  <div class="register-body">
    <form id="registerForm">
      <div class="form-group">
        <label><i class="fas fa-user"></i> Full Name</label>
        <input type="text" id="fullName" placeholder="John Doe" required>
      </div>
      <div class="form-group">
        <label><i class="fas fa-envelope"></i> Email</label>
        <input type="email" id="email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <input type="password" id="password" placeholder="At least 6 characters" required>
      </div>
      <div class="form-group">
        <label><i class="fas fa-check-circle"></i> Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm password" required>
      </div>
      <div class="form-group">
        <label><i class="fas fa-briefcase"></i> Role</label>
        <select id="role" required>
          <option value="manager">Manager</option>
          <option value="admin">Administrator</option>
          <option value="housekeeping">Housekeeping Staff</option>
        </select>
      </div>
      <button type="submit" class="btn-register" id="registerBtn">✅ Register</button>
      <div id="message" class="error-message"></div>
    </form>
    <div class="login-link">
      Already have an account? <a href="/login">Login here</a>
    </div>
  </div>
</div>

<script>
  const form = document.getElementById('registerForm');
  const messageDiv = document.getElementById('message');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    messageDiv.innerHTML = '';
    const fullName = document.getElementById('fullName').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;
    const role = document.getElementById('role').value;

    if (!fullName || !email || !password || !confirm || !role) {
      messageDiv.innerHTML = 'All fields are required.';
      return;
    }
    if (password !== confirm) {
      messageDiv.innerHTML = 'Passwords do not match.';
      return;
    }
    if (password.length < 6) {
      messageDiv.innerHTML = 'Password must be at least 6 characters.';
      return;
    }

    const registerBtn = document.getElementById('registerBtn');
    registerBtn.disabled = true;
    registerBtn.innerHTML = '⏳ Registering...';

    try {
      const response = await fetch('http://localhost:3000/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fullName, email, password, role })
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error);
      messageDiv.className = 'success-message';
      messageDiv.innerHTML = '✅ Registration successful! Redirecting to login...';
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 2000);
    } catch (err) {
      messageDiv.className = 'error-message';
      messageDiv.innerHTML = err.message;
      registerBtn.disabled = false;
      registerBtn.innerHTML = '✅ Register';
    }
  });
</script>
</body>
</html>
